<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>관리자 대시보드 | 손수오 보이스 컨설팅</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f1117;--bg2:#1a1d27;--bg3:#252836;--accent:#ff6b35;--text:#e8e8f0;--text2:#8888a0;--green:#34d399;--red:#f87171;--yellow:#fbbf24}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);display:flex;min-height:100vh}
.sidebar{width:240px;background:var(--bg2);padding:1.5rem;border-right:1px solid rgba(255,255,255,.05);position:fixed;height:100vh;overflow-y:auto}
.sidebar h2{font-size:1rem;margin-bottom:2rem;color:var(--accent)}
.sidebar a{display:block;padding:.7rem 1rem;border-radius:8px;color:var(--text2);font-size:.9rem;cursor:pointer;transition:all .2s;margin-bottom:.3rem}
.sidebar a:hover,.sidebar a.active{background:rgba(255,107,53,.1);color:var(--accent)}
.main{margin-left:240px;flex:1;padding:2rem}
.page{display:none}.page.active{display:block}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1rem;margin-bottom:2rem}
.stat-card{background:var(--bg2);padding:1.5rem;border-radius:12px;border:1px solid rgba(255,255,255,.05)}
.stat-card .num{font-size:2rem;font-weight:700;color:var(--accent)}
.stat-card .label{color:var(--text2);font-size:.85rem;margin-top:.3rem}
h1{font-size:1.5rem;margin-bottom:1.5rem}
table{width:100%;border-collapse:collapse;background:var(--bg2);border-radius:12px;overflow:hidden}
th,td{padding:.8rem 1rem;text-align:left;border-bottom:1px solid rgba(255,255,255,.05);font-size:.85rem}
th{background:var(--bg3);color:var(--text2);font-weight:500}
.badge{padding:.2rem .6rem;border-radius:6px;font-size:.75rem;font-weight:600}
.badge.pending{background:rgba(251,191,36,.15);color:var(--yellow)}
.badge.confirmed{background:rgba(52,211,153,.15);color:var(--green)}
.badge.cancelled{background:rgba(248,113,113,.15);color:var(--red)}
.btn{padding:.5rem 1rem;border:none;border-radius:8px;cursor:pointer;font-size:.8rem;font-weight:600;transition:all .2s}
.btn-primary{background:var(--accent);color:#fff}
.btn-sm{padding:.3rem .6rem;font-size:.75rem}
.btn-green{background:rgba(52,211,153,.2);color:var(--green)}
.btn-red{background:rgba(248,113,113,.2);color:var(--red)}
.form-group{margin-bottom:1rem}
.form-group label{display:block;color:var(--text2);font-size:.85rem;margin-bottom:.3rem}
.form-group input,.form-group textarea,.form-group select{width:100%;padding:.7rem;background:var(--bg3);border:1px solid rgba(255,255,255,.1);border-radius:8px;color:var(--text);font-family:inherit;font-size:.9rem}
.form-group textarea{min-height:80px;resize:vertical}
.card{background:var(--bg2);border-radius:12px;padding:1.5rem;border:1px solid rgba(255,255,255,.05);margin-bottom:1rem}
@media(max-width:768px){.sidebar{display:none}.main{margin-left:0}}
</style>
</head>
<body>
<div class="sidebar">
  <h2>🎙️ 관리자</h2>
  <a class="active" onclick="showPage('dashboard')">📊 대시보드</a>
  <a onclick="showPage('bookings')">📋 예약 관리</a>
  <a onclick="showPage('courses')">📚 교육 과정</a>
  <a onclick="showPage('content')">🖼️ 사이트 콘텐츠</a>
  <a onclick="showPage('testimonials')">💬 수강생 후기</a>
  <a onclick="showPage('settings')">⚙️ 설정</a>
  <a href="/" style="margin-top:2rem;border-top:1px solid rgba(255,255,255,.05);padding-top:1rem">← 사이트 보기</a>
</div>
<div class="main">

<!-- Dashboard -->
<div class="page active" id="page-dashboard">
  <h1>대시보드</h1>
  <div class="stats-grid" id="statsGrid">
    <div class="stat-card"><div class="num" id="statTotal">-</div><div class="label">전체 예약</div></div>
    <div class="stat-card"><div class="num" id="statPending">-</div><div class="label">대기 중</div></div>
    <div class="stat-card"><div class="num" id="statConfirmed">-</div><div class="label">확정</div></div>
  </div>
  <div class="card"><h3 style="margin-bottom:1rem">최근 예약</h3><div id="recentBookings">로딩 중...</div></div>
</div>

<!-- Bookings -->
<div class="page" id="page-bookings">
  <h1>예약 관리</h1>
  <div style="margin-bottom:1rem;display:flex;gap:.5rem">
    <button class="btn btn-primary btn-sm" onclick="filterBookings('all')">전체</button>
    <button class="btn btn-sm" style="background:var(--bg3)" onclick="filterBookings('pending')">대기</button>
    <button class="btn btn-sm" style="background:var(--bg3)" onclick="filterBookings('confirmed')">확정</button>
    <button class="btn btn-sm" style="background:var(--bg3)" onclick="filterBookings('cancelled')">취소</button>
  </div>
  <table><thead><tr><th>이름</th><th>과정</th><th>날짜</th><th>상태</th><th>액션</th></tr></thead><tbody id="bookingsTable"></tbody></table>
</div>

<!-- Courses -->
<div class="page" id="page-courses">
  <h1>교육 과정 관리</h1>
  <div id="coursesList">로딩 중...</div>
</div>

<!-- Content -->
<div class="page" id="page-content">
  <h1>사이트 콘텐츠 편집</h1>
  <form id="contentForm" class="card">
    <div class="form-group"><label>히어로 타이틀</label><textarea id="ct_hero_title"></textarea></div>
    <div class="form-group"><label>히어로 부제목</label><textarea id="ct_hero_subtitle"></textarea></div>
    <div class="form-group"><label>CTA 버튼 텍스트</label><input id="ct_hero_cta"></div>
    <div class="form-group"><label>전문가 이름</label><input id="ct_expert_name"></div>
    <div class="form-group"><label>전문가 소개</label><textarea id="ct_expert_intro"></textarea></div>
    <button type="submit" class="btn btn-primary">저장</button>
  </form>
</div>

<!-- Testimonials -->
<div class="page" id="page-testimonials">
  <h1>수강생 후기</h1>
  <button class="btn btn-primary" onclick="addTestimonial()" style="margin-bottom:1rem">+ 후기 추가</button>
  <div id="testiList">로딩 중...</div>
</div>

<!-- Settings -->
<div class="page" id="page-settings">
  <h1>설정</h1>
  <div class="card">
    <h3>데이터베이스</h3>
    <p style="color:var(--text2);font-size:.9rem;margin:1rem 0">DB를 초기화하면 기본 데이터가 생성됩니다.</p>
    <button class="btn btn-primary" onclick="initDB()">DB 초기화</button>
    <div id="dbStatus" style="margin-top:1rem;font-size:.85rem"></div>
  </div>
</div>

</div>

<script>
const API = '/api';
let allBookings = [];

function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  document.querySelectorAll('.sidebar a').forEach(a => a.classList.remove('active'));
  event.target.classList.add('active');
  if (name === 'dashboard') loadDashboard();
  if (name === 'bookings') loadBookings();
  if (name === 'courses') loadCourses();
  if (name === 'content') loadContent();
  if (name === 'testimonials') loadTestimonials();
}

async function loadDashboard() {
  try {
    const stats = await fetch(API + '/stats').then(r => r.json());
    document.getElementById('statTotal').textContent = stats.total;
    document.getElementById('statPending').textContent = stats.pending;
    document.getElementById('statConfirmed').textContent = stats.confirmed;
    const bookings = await fetch(API + '/bookings').then(r => r.json());
    const recent = bookings.slice(0, 5);
    document.getElementById('recentBookings').innerHTML = recent.length ? recent.map(b =>
      `<div style="display:flex;justify-content:space-between;padding:.5rem 0;border-bottom:1px solid rgba(255,255,255,.05)">
        <span>${b.name} — ${b.course}</span>
        <span class="badge ${b.status}">${b.status}</span>
      </div>`
    ).join('') : '<p style="color:var(--text2)">예약이 없습니다.</p>';
  } catch(e) { document.getElementById('recentBookings').innerHTML = '<p style="color:var(--red)">DB를 먼저 초기화해주세요. (설정 → DB 초기화)</p>'; }
}

async function loadBookings() {
  try {
    allBookings = await fetch(API + '/bookings').then(r => r.json());
    renderBookings(allBookings);
  } catch(e) { document.getElementById('bookingsTable').innerHTML = '<tr><td colspan="5">데이터를 불러올 수 없습니다.</td></tr>'; }
}

function filterBookings(status) {
  renderBookings(status === 'all' ? allBookings : allBookings.filter(b => b.status === status));
}

function renderBookings(list) {
  document.getElementById('bookingsTable').innerHTML = list.map(b =>
    `<tr>
      <td>${b.name}<br><span style="color:var(--text2);font-size:.75rem">${b.email}</span></td>
      <td>${b.course}</td>
      <td>${b.date} ${b.time}</td>
      <td><span class="badge ${b.status}">${b.status}</span></td>
      <td>
        ${b.status === 'pending' ? `<button class="btn btn-green btn-sm" onclick="updateStatus('${b.id}','confirmed')">확정</button> <button class="btn btn-red btn-sm" onclick="updateStatus('${b.id}','cancelled')">취소</button>` : ''}
      </td>
    </tr>`
  ).join('') || '<tr><td colspan="5">예약이 없습니다.</td></tr>';
}

async function updateStatus(id, status) {
  await fetch(API + '/bookings/' + id + '/status', { method: 'PATCH', headers: {'Content-Type':'application/json'}, body: JSON.stringify({status}) });
  loadBookings();
}

async function loadCourses() {
  try {
    const courses = await fetch(API + '/courses').then(r => r.json());
    document.getElementById('coursesList').innerHTML = courses.map(c => `
      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div><strong>${c.name}</strong> — ${c.duration} — ${Number(c.price).toLocaleString()}원</div>
        </div>
        <p style="color:var(--text2);font-size:.85rem;margin-top:.5rem">${c.description}</p>
      </div>
    `).join('');
  } catch { document.getElementById('coursesList').innerHTML = '<p style="color:var(--text2)">DB를 먼저 초기화해주세요.</p>'; }
}

async function loadContent() {
  try {
    const data = await fetch(API + '/content').then(r => r.json());
    ['hero_title','hero_subtitle','hero_cta','expert_name','expert_intro'].forEach(k => {
      const el = document.getElementById('ct_' + k);
      if (el) el.value = data[k] || '';
    });
  } catch {}
}

document.getElementById('contentForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const body = {};
  ['hero_title','hero_subtitle','hero_cta','expert_name','expert_intro'].forEach(k => {
    body[k] = document.getElementById('ct_' + k).value;
  });
  await fetch(API + '/content', { method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) });
  alert('저장되었습니다!');
});

async function loadTestimonials() {
  try {
    const data = await fetch(API + '/testimonials').then(r => r.json());
    document.getElementById('testiList').innerHTML = data.map(t => `
      <div class="card">
        <div style="display:flex;justify-content:space-between">
          <div><strong>${t.name}</strong> <span style="color:var(--text2);font-size:.85rem">${t.role}</span></div>
          <span style="color:var(--yellow)">${'★'.repeat(t.rating)}</span>
        </div>
        <p style="color:var(--text2);font-size:.9rem;margin-top:.5rem">${t.content}</p>
      </div>
    `).join('') || '<p style="color:var(--text2)">후기가 없습니다.</p>';
  } catch { document.getElementById('testiList').innerHTML = '<p style="color:var(--text2)">DB를 먼저 초기화해주세요.</p>'; }
}

async function addTestimonial() {
  const name = prompt('이름:'); if (!name) return;
  const role = prompt('직함:');
  const content = prompt('후기 내용:'); if (!content) return;
  await fetch(API + '/testimonials', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({name, role, content, rating: 5}) });
  loadTestimonials();
}

async function initDB() {
  const el = document.getElementById('dbStatus');
  el.textContent = '초기화 중...';
  el.style.color = 'var(--yellow)';
  try {
    const res = await fetch(API + '/setup').then(r => r.json());
    el.textContent = '✅ ' + res.message;
    el.style.color = 'var(--green)';
    loadDashboard();
  } catch(e) {
    el.textContent = '❌ 오류: ' + e.message;
    el.style.color = 'var(--red)';
  }
}

// Init
loadDashboard();
</script>
</body>
</html>
